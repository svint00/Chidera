<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div id="demo"></div>
   <div class="container shadow p-2 my-5 w-75">
       <ol id="list1" ></ol>
   </div>
   <ul id="list2"></ul>
   <ul id="list3"></ul>
</body>
<script>
 
// Loops  - repition, count
for( i = 0; i<10; i++){
    document.writeln(i)
    document.writeln('Yellow')
}

fruits = ["Apple",'Water Melon', 'Red',' Blue','Pink','Yellow'] // list
for(i=0;i<6; i++){
    document.querySelector('#list1').innerHTML += "<li class='p-2 my-2 rounded bg-warning'>" + fruits[i] +"</li>"
}
document.writeln("<br>")
document.writeln("<br>")

// create a new list still loop and print

courses = ['css','script','py','react','cpp','c#','c']
for(i=0; i<7; i++){
    document.querySelector('#list2').innerHTML += "<li>" + courses[i] + "</li>"
}
document.writeln('<br>')
document.writeln('<br>')


cars = [`honda`,`toyota`,'hyundai']
for(i=0;i<3; i++){
    document.querySelector('#list3').innerHTML += '<li>' + cars[i] + '</li'
}






</script>
</html>
