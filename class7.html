            <label for=""> Password </label>

            <div id="response" class="py-1"></div>
            <button type="button" onclick="submit_form()" class="btn btn-primary"> Submit</button>
        </form>
        </section>
</body>
<script>
    function submit_form(){
        let username = document.querySelector('#username')
        let pasword = document.querySelector('#password')
        let response = document.querySelector('#response')
        if(username.value == ''){
            response.innerHTML = "Username is required";
            response.className='text-danger py-1' 
        }
        else if(password.value == ''){
            response.innerHTML = "Password is required";
            response.className='text-danger py-1' 
        }else{
            response.innerHTML = "Login Successfull "
            response.className='text-primary py-1' 

            const data = {

    }
