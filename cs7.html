<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <form action="">
            <label for=""> Username</label>
            <input type="text" name="" id="username">

            <label for=""> Password </label>
            <input type="password" name="" id="password">
            <div id="response">w434534534</div>
            <button type="button" onclick="submit_form()"> Submit</button>
        </form>
</body>
<script>
    function submit_form(){
        let username = document.querySelector('#username')
        let pasword = document.querySelector('#password')
        let response = document.querySelector('#response')
        if(username.value == ''){
            response.innerHTML = "Username is required";
            //text red 
            response.style.color='red' 
        }
        else if(password.value == ''){
            response.innerHTML = "Password is required";
            // text red
            response.style.color='red'
        }else{
            response.innerHTML = "OKay"
            // text blue
            response.style.color='blue'
        }
    }

    //document.querySelector('#response').style.color = 'red'
    
    
</script>
</html>
